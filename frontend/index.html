<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQI Cloud</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 40px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin: auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        .value {
            font-size: 22px;
            margin: 10px 0;
        }

        .status {
            color: orange;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>AQI Cloud (Monitoreo Simulado)</h1>

        <div class="value">Temperatura: 25.3 °C</div>
        <div class="value">Humedad: 48 %</div>
        <div class="value">PM2.5: 28</div>
        <div class="value">PM10: 35</div>

        <div class="value status">
            AQI: Moderado
        </div>
    </div>

</body>
</html>
